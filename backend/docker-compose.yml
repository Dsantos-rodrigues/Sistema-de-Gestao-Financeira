version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: financeiro_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bianca_api
      POSTGRES_PASSWORD: senha_dev_123
      POSTGRES_DB: financeiro
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bianca_api -d financeiro']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: financeiro_cache
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
